    <div class="setting show" id="generate">
      <div>
        <h2>Generate Settings</h2>
        <div>
          <label for="rows">Rows</label>
          <input type="number" name="rows" id="rows" value="20" min="5">
        </div>
        
        <div>
          <label for="cols">Cols</label>
          <input type="number" name="cols" id="cols" value="20" min="5">
        </div>

        <div>
          <label for="generation-algorithm">Generate Strategy</label>
          <select name="generation-algorithm" id="generation-algorithm">
            <option value="backtracking">Backtracking</option>
            <option value="prim">Prim</option>
          </select>
        </div>

        <div>
          <label for="workspace">Environment Mode</label>
          <select name="workspace" id="workspace">
            <option value="playground">Playground</option>
            <option value="benchmark">Benchmark</option>
          </select>
        </div>

        <div>
          <label for="perfect-maze">
            <input type="checkbox" name="perfect-maze" id="perfect-maze" checked>
            Perfect maze
          </label>
        </div>
      </div>

      <button id="generate-maze">Generate maze</button>
    </div>

    <div class="setting" id="solve">
      <div>
        <h2>Solve Settings</h2>
        <div>
          <label for="solver-algorithm">Search Strategy</label>
          <select name="solver-algorithm" id="solver-algorithm">
            <option value="astar" selected>A*</option>
          </select>
        </div>

        <div>
          <label for="heuristic">Heuristic Function (<i>h(n)</i>)</label>
          <select name="heuristic" id="heuristic">
            <option value="manhattan" selected>Manhattan distance</option>
            <option value="euclidean">Euclidean distance</option>
            <option value="none">None</option>
          </select>
        </div>
      </div>

      <button id="solve-maze">Solve maze</button>
    </div>
    
    <div class="setting" id="general">
      <div>
        <h2>General Settings</h2>
        <div>
          <label for="animation">
            <input type="checkbox" name="animation" id="animation" checked>
            Step Delay / UPS
          </label>
        </div>

        <div>
          <label for="speed">Animation speed</label>
          <input type="range" name="speed" id="speed" value="1" min="0.25" max="2" step="0.25">
        </div>
      </div>
    </div>
  </div>

  <main>
    <div class="maze-container">

    </div>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
